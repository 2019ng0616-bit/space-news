<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space News AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1>🚀 Space News AI</h1>
    <p>Latest Space News from NASA, JAXA, ESA and SpaceNews</p>
</header>

<main class="container">

{% for article in articles %}

<div class="card">

    <div class="source">
        {{ article.source }}
    </div>

    <h2>
        {{ article.title }}
    </h2>

    <p class="date">
        {{ article.published }}
    </p>

    <div class="summary">
        <strong>AI Summary</strong>
        <p>Coming soon...</p>
    </div>

    <a class="button"
       href="{{ article.link }}"
       target="_blank">
       Read Article
    </a>

</div>

{% endfor %}

</main>

</body>

</html>
